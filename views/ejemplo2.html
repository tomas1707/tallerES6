<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    
    <title>curso Java Script</title>
</head>
<bodyo >
    <h1>Tipos de variables</h1>
    <h3>No olvides presionar Ctrl + Shift + J para ver la consola</h3>

    <script>
        // Variable tipo texto
        let nombre = "Carlos";

        // Variable tipo número entero
        let edad = 20;

        // Variable tipo decimal
        let promedio = 9.5;

        // Variable tipo booleano
        let aprobado = true;

        // Mostrar resultados en consola
        console.log("Nombre: " + nombre);
        console.log("Edad: " + edad);
        console.log("Promedio: " + promedio);
        console.log("¿Aprobado?: " + aprobado);
    </script>
</body>
